<!DOCTYPE html>
<html>
<head>
  <!-- ============================================================
       WAYMARK - Diary Map Application
       Author: Brooke Fandrich
       Description: A web app for recording diary entries on an 
                   interactive map with storytelling features.
       ============================================================ -->
  
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waymark - Diary Map</title>
  
  <!-- Load main stylesheet and script -->
  <link rel="stylesheet" type="text/css" href="css/base.css">
  <link rel="stylesheet" type="text/css" href="css/components.css">
  <script type="text/javascript" src="js/main.js"></script>
</head>
<body>
  <!-- Main Application Container -->
  <div id="mainApp" style="display: none;">
    <!-- Top Navigation Bar -->
    <div class="top-nav">
      <h1>Waymark</h1>
      <span id="userInfo">User</span>
    </div>
    
    <!-- Mobile Navigation Buttons -->
    <div class="mobile-nav">
      <button id="navMap">🗺️ Map</button>
      <button id="navList">📝 Entries</button>
      <button id="navProfile">👤 Profile</button>
    </div>

    <!-- Main Content Area: Map + Sidebar -->
    <div class="main-container">
      <!-- Map Container (ArcGIS Map) -->
      <div class="map-container">
        <div id="viewDiv"></div>
        <div id="searchContainer"></div>
      </div>

      <!-- Sidebar: Entry List and Stories -->
      <div id="sidebar">
        <!-- Entry List Section -->
        <div class="sidebar-section">
          <h3>My Entries</h3>
          <button id="storiesBtn">📖 Stories</button>
          <div id="entriesList"></div>
        </div>
      </div>

      <!-- Entry Detail Panel (Read-only view) -->
      <div id="entryDetailPanel" class="detail-panel">
        <button id="closeDetailBtn">✕ Close</button>
        <h2 id="detailTitle"></h2>
        <small id="detailMeta"></small>
        <div id="detailContent"></div>
      </div>
    </div>

    <!-- Entry Editor Modal -->
    <div id="entryModal" class="modal">
      <div class="modal-content">
        <h2 id="entryModalTitle">New Entry</h2>
        <p id="entryCoords"></p>
        
        <!-- Entry Form Fields -->
        <input id="entryTitle" type="text" placeholder="Entry Title">
        <input id="entryDate" type="datetime-local">
        
        <!-- Text Editor with Formatting Buttons -->
        <div class="editor-toolbar">
          <button class="editor-btn" data-cmd="bold" title="Bold">B</button>
          <button class="editor-btn" data-cmd="italic" title="Italic">I</button>
          <button class="editor-btn" data-cmd="createLink" title="Link">🔗</button>
          <button class="editor-btn" data-cmd="insertUnorderedList" title="Bullet List">•</button>
          <button class="editor-btn" data-cmd="alphaList" title="Numbered List">1.</button>
          <button class="editor-btn" data-cmd="checkList" title="Checklist">☐</button>
        </div>
        <div id="entryEditor" class="editor-content" contenteditable="true"></div>
        
        <!-- Image Upload -->
        <label for="entryImageInput">📷 Add Image:</label>
        <input id="entryImageInput" type="file" accept="image/*">
        <button id="removeImageBtn" style="display: none;">Remove Image</button>
        <div id="imagePreview"></div>
        
        <!-- Modal Buttons -->
        <button id="saveEntryBtn" class="btn-primary">Save Entry</button>
        <button id="cancelEntryBtn">Cancel</button>
      </div>
    </div>

    <!-- Stories Modal -->
    <div id="storiesModal" class="modal">
      <div class="modal-content">
        <button id="closeStoriesBtn">✕ Close</button>
        <h2>My Stories</h2>
        <button id="createNewStoryBtn">+ New Story</button>
        <div id="storiesList"></div>
      </div>
    </div>

    <!-- Story Editor Modal -->
    <div id="storyEditModal" class="modal">
      <div class="modal-content">
        <h2>Edit Story</h2>
        <input id="storyTitleInput" type="text" placeholder="Story Title">
        
        <!-- Color Picker Controls -->
        <label>Line Color:</label>
        <button id="openColorPickerBtn">Open Color Picker</button>
        <div id="colorPreview" style="width: 30px; height: 30px; background: #a43855; border-radius: 4px; cursor: pointer;"></div>
        <input id="colorHexInput" type="text" placeholder="#a43855">
        <input id="storyLineColor" type="hidden">
        
        <!-- Quick Color Presets -->
        <div style="margin: 10px 0;">
          <button class="quick-color-btn" data-color="#a43855">◆ Red</button>
          <button class="quick-color-btn" data-color="#d4af37">◆ Gold</button>
          <button class="quick-color-btn" data-color="#2e8b57">◆ Green</button>
          <button class="quick-color-btn" data-color="#4169e1">◆ Blue</button>
        </div>
        
        <!-- Available & Selected Entries Lists -->
        <h4>Available Entries:</h4>
        <div id="availableEntriesList"></div>
        
        <h4>Story Sequence (drag to reorder):</h4>
        <ol id="storyEntriesList"></ol>
        
        <!-- Modal Buttons -->
        <button id="saveStoryBtn" class="btn-primary">Save Story</button>
        <button id="cancelStoryBtn">Cancel</button>
      </div>
    </div>

    <!-- Color Picker Modal -->
    <div id="colorPickerModal" class="modal">
      <div class="modal-content">
        <h2>Pick a Color</h2>
        <div id="colorPreviewLarge" style="width: 100%; height: 100px; border-radius: 4px; background: #a43855; margin-bottom: 15px;"></div>
        <label>Hue:</label>
        <input id="hueSlider" type="range" min="0" max="360" value="341" style="width: 100%;">
        <label>Saturation:</label>
        <input id="satSlider" type="range" min="0" max="100" value="67" style="width: 100%;">
        <label>Lightness:</label>
        <input id="lightSlider" type="range" min="0" max="100" value="40" style="width: 100%;">
        <input id="colorHexInputModal" type="text" placeholder="#a43855">
        <button id="applyColorBtn" class="btn-primary">Apply</button>
        <button id="cancelColorBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Login Screen (shown first) -->
  <div id="loginScreen" class="login-container">
    <h1>🗺️ Waymark</h1>
    <p>Track your journey, one memory at a time.</p>
    <input id="emailInput" type="email" placeholder="Your email">
    <button id="loginBtn" class="btn-primary">Login</button>
    <button id="guestBtn">Guest Mode</button>
  </div>

  <!-- ============================================================
       Load JavaScript Modules
       Each module handles a specific feature of the application.
       The modules are loaded in this order to ensure proper initialization.
       ============================================================ -->
  
  <!-- Utility functions and helpers -->
  <script src="js/utils.js"></script>
  
  <!-- Global application state -->
  <script src="js/state.js"></script>
  
  <!-- Entry creation and management -->
  <script src="js/entries.js"></script>
  
  <!-- Map initialization and graphics handling -->
  <script src="js/map.js"></script>
  
  <!-- Popup and point graphic management -->
  <script src="js/popups.js"></script>
  
  <!-- Story/journey creation and management -->
  <script src="js/stories.js"></script>
  
  <!-- UI modals and detail panels -->
  <script src="js/ui.js"></script>
  
  <!-- Event listeners and handlers -->
  <script src="js/eventHandlers.js"></script>
  
  <!-- ArcGIS API (for mapping functionality) -->
  <script src="https://js.arcgis.com/4.28/"></script>
</body>
</html>
