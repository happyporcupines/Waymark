<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>My Map Diary</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="loginScreen" class="overlay">
    <div class="login-box">
        <h2>Welcome to Map Diary 🖤</h2>
        <p>Log in to save your memories.</p>
        <input type="email" id="emailInput" placeholder="Email" />
        <input type="password" id="passwordInput" placeholder="Password" />
        <button id="loginBtn" type="button">Log In / Sign Up</button>
        <button id="guestBtn" type="button">No need to login (data will not be saved)</button>
    </div>
</div>

<div id="mainApp" class="app-container" style="display: none;">

    <header class="app-header">
        <h2>My Map Diary</h2>
        <div id="userInfo">Not Logged In</div>
    </header>

    <div class="app-body">
        <aside id="sidebar" class="sidebar">
            <div id="searchContainer"></div>
            <h3>My Journal Entries</h3>
            <div id="entriesList">
                <p>No entries yet. Tap the map to create one!</p>
            </div>
        </aside>

        <div class="map-container">
            <div id="viewDiv"></div>
            <div class="map-hint">double click to add entry</div>
        </div>

        <aside id="entryDetailPanel" class="entry-detail-panel">
            <div class="entry-detail-header">
                <h3 id="detailTitle">Entry</h3>
                <button id="closeDetailBtn" type="button">Close</button>
            </div>
            <p id="detailMeta" class="entry-detail-meta"></p>
            <div id="detailContent" class="entry-detail-content"></div>
        </aside>
    </div>

    <nav class="mobile-nav">
        <button id="navMap" type="button">Map</button>
        <button id="navList" type="button">Entries</button>
        <button id="navProfile" type="button">Profile</button>
    </nav>

</div>

<div id="entryModal" class="overlay" style="display: none;">
    <div class="entry-modal-box">
        <h3 id="entryModalTitle">New Diary Entry 📓</h3>
        <p id="entryCoords" class="entry-coords"></p>

        <input type="text" id="entryTitle" placeholder="Entry Title" />

        <div class="editor-toolbar">
            <button type="button" class="editor-btn" data-cmd="bold">B</button>
            <button type="button" class="editor-btn" data-cmd="italic">I</button>
            <button type="button" class="editor-btn" data-cmd="underline">U</button>
            <button type="button" class="editor-btn" data-cmd="strikeThrough">S</button>
            <button type="button" class="editor-btn" data-cmd="insertUnorderedList">• List</button>
            <button type="button" class="editor-btn" data-cmd="insertOrderedList">123</button>
            <button type="button" class="editor-btn" data-cmd="alphaList">ABC</button>
            <button type="button" class="editor-btn" data-cmd="checkList">☑</button>
            <button type="button" class="editor-btn" data-cmd="indent">Indent</button>
            <button type="button" class="editor-btn" data-cmd="outdent">Outdent</button>
        </div>

        <div id="entryEditor" class="entry-editor" contenteditable="true"></div>

        <div class="entry-modal-actions">
            <button id="saveEntryBtn" type="button" class="save-btn">Save</button>
            <button id="cancelEntryBtn" type="button" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<script src="https://js.arcgis.com/4.26/"></script>
<script src="js/app.js"></script>
</body>
</html>
